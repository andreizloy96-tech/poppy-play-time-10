<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Poppy Playtime Chapter 10 | Автостарт + Троллинг</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; right: 20px; color: white; z-index: 100; pointer-events: none; text-shadow: 2px 2px 4px black; }
        .top-panel { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; pointer-events: auto; }
        .info-box, .players-list { background: rgba(0,0,0,0.7); border-left: 4px solid #ff4444; padding: 12px 20px; border-radius: 8px; backdrop-filter: blur(5px); }
        .players-list { min-width: 200px; }
        .player-item { margin: 5px 0; font-size: 13px; display: flex; justify-content: space-between; }
        .status-playing { background: #f39c12; }
        .status-caught { background: #7f8c8d; }
        .items-count { font-size: 11px; color: #ffaa00; }
        .ammo-count { font-size: 11px; color: #ffaa33; margin-left: 8px; }
        
        .chat-container { position: absolute; bottom: 20px; left: 20px; width: 320px; background: rgba(0,0,0,0.7); border-radius: 8px; pointer-events: auto; }
        .chat-messages { height: 200px; overflow-y: auto; padding: 10px; font-size: 12px; color: #ccc; }
        .chat-input-container { display: flex; padding: 8px; border-top: 1px solid #444; }
        #chatInput { flex:1; background: rgba(0,0,0,0.5); border:1px solid #ff4444; color:white; padding:8px; border-radius:4px; }
        .chat-send-btn { background:#ff4444; border:none; color:white; padding:8px 15px; margin-left:8px; border-radius:4px; cursor:pointer; }
        
        .pickup-prompt { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #ffaa00; padding: 10px 20px; border-radius: 8px; pointer-events: none; z-index: 100; white-space: nowrap; }
        .danger-indicator { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 200px; height: 4px; background: rgba(0,0,0,0.5); border-radius: 2px; overflow: hidden; pointer-events: none; }
        .danger-fill { height: 100%; width: 0%; background: #ff4444; transition: width 0.1s linear; }
        #notification { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 2px solid #ff4444; padding: 20px 40px; border-radius: 12px; color: white; font-size: 24px; font-weight: bold; text-align: center; z-index: 200; pointer-events: none; white-space: pre-line; }
        .crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); border: 2px solid white; border-radius: 50%; pointer-events: none; z-index: 200; }
        .weapon-hud { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 8px; font-family: monospace; font-size: 18px; color: #ffaa33; border-left: 3px solid #ffaa33; pointer-events: none; z-index: 100; }
        
        /* Панель троллинга */
        .troll-panel {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #ff4444;
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(8px);
            z-index: 200;
            pointer-events: auto;
            font-family: monospace;
            width: 220px;
            display: none;
        }
        .troll-panel.visible { display: block; }
        .troll-panel h4 { margin: 0 0 10px 0; color: #ff8888; text-align: center; }
        .troll-panel button {
            display: block;
            width: 100%;
            margin: 5px 0;
            padding: 6px;
            background: #333;
            border: 1px solid #ff4444;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-family: monospace;
        }
        .troll-panel button:hover { background: #ff4444; }
        .troll-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 201;
            font-size: 12px;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="top-panel">
            <div class="info-box">
                <h3>🏭 POPPY PLAYTIME - ЧАС РАДОСТИ</h3>
                <p id="gameStatusText">Статус: Подключение...</p>
                <p id="itemsText">Ключи: 0/3</p>
                <p id="monsterStatus">👾 Прототип: Ищет...</p>
            </div>
            <div class="players-list">
                <h3>👥 ИГРОКИ <span id="playersCount">(0)</span></h3>
                <div id="playersList"></div>
            </div>
        </div>
    </div>
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-container">
            <input type="text" id="chatInput" placeholder="Чат...">
            <button class="chat-send-btn" id="chatSendBtn">➤</button>
        </div>
    </div>
    <div class="pickup-prompt" id="pickupPrompt" style="display: none;">🔑 Нажмите E, чтобы взять ключ</div>
    <div class="pickup-prompt" id="gunPrompt" style="display: none; bottom: 160px;">🔫 Нажмите E, чтобы взять Desert Eagle</div>
    <div class="danger-indicator"><div class="danger-fill" id="dangerFill"></div></div>
    <div class="crosshair"></div>
    <div class="weapon-hud" id="weaponHud" style="display: none;">🔫 Desert Eagle | <span id="ammoCount">0</span> патр.</div>
    <div id="notification" style="display: none;"></div>
    
    <!-- Кнопка вызова панели троллинга -->
    <div class="troll-toggle" id="trollToggle">🎭 Троллинг</div>
    <div class="troll-panel" id="trollPanel">
        <h4>⚡ Управление игроком</h4>
        <input type="text" id="targetPlayerName" placeholder="Имя игрока" style="width:100%; margin-bottom:8px; background:#222; border:1px solid #ff4444; color:white;">
        <button id="btnKill">💀 Убить</button>
        <button id="btnYeet">🚀 Подбросить</button>
        <button id="btnTeleport">🌀 Телепорт</button>
        <button id="btnStrip">⚡ Лишить оружия</button>
        <button id="btnStun">😵 Оглушить</button>
        <button id="btnHeal">❤️ Воскресить+победа</button>
        <button id="btnSetItems">🔑 Дать 3 ключа</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ---- Глобальные переменные ----
        let socket, playerId, players = {}, items = [], monsterState, gameState = 'waiting', myPlayer = null;
        let isGameActive = false, localItems = 0, localAmmo = 0, hasGun = false;
        let playerName = "Выживший";
        let scene, camera, renderer, playerMeshes = {}, monsterMesh, itemMeshes = [], weaponMesh = null;
        let keys = { w: false, s: false, a: false, d: false }, mouseX = 0, mouseY = 0, playerRotationY = 0, playerPosition = { x: 0, z: 0 };
        const MAP_SIZE = 40, PLAYER_SPEED = 6.0;
        let lastTimestamp = 0, nearestItemId = null, nearestWeapon = false;
        let weapon = null;
        
        // DOM элементы
        const gameStatusText = document.getElementById('gameStatusText');
        const itemsText = document.getElementById('itemsText');
        const monsterStatus = document.getElementById('monsterStatus');
        const playersListDiv = document.getElementById('playersList');
        const playersCountSpan = document.getElementById('playersCount');
        const notificationDiv = document.getElementById('notification');
        const pickupPrompt = document.getElementById('pickupPrompt');
        const gunPrompt = document.getElementById('gunPrompt');
        const dangerFill = document.getElementById('dangerFill');
        const chatMessagesDiv = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const weaponHud = document.getElementById('weaponHud');
        const ammoCountSpan = document.getElementById('ammoCount');
        const trollToggle = document.getElementById('trollToggle');
        const trollPanel = document.getElementById('trollPanel');
        
        // Секрет для панели троллинга (проверяем URL параметр ?secret=admin123)
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('secret') === 'admin123';
        if (isAdmin) {
            trollToggle.style.display = 'block';
        } else {
            trollToggle.style.display = 'none';
        }
        
        function showNotification(msg, isErr=false) { 
            notificationDiv.style.display='block'; 
            notificationDiv.textContent=msg; 
            notificationDiv.style.borderColor=isErr?'#ff4444':'#2ecc71'; 
            setTimeout(()=>notificationDiv.style.display='none',4000); 
        }
        function showScreenFlash() { const f=document.createElement('div'); f.className='screen-flash'; document.body.appendChild(f); setTimeout(()=>f.remove(),300); }
        
        function updateUI() {
            if(gameState==='playing') { 
                gameStatusText.innerHTML='Статус: 🔴 ОХОТА'; 
                itemsText.innerHTML=`🔑 Ключи: ${localItems}/3`; 
                monsterStatus.innerHTML=monsterState && monsterState.state==='chase'?'👾 Прототип: 🔴 ПРЕСЛЕДУЕТ! 🔴':(monsterState && monsterState.state==='stunned'?'👾 Прототип: 😵 ОГЛУШЕН!':'👾 Прототип: Ищет...'); 
            } else if(gameState==='game_over') { 
                gameStatusText.innerHTML='Статус: ⚫ ИГРА ОКОНЧЕНА'; 
            }
            weaponHud.style.display = hasGun ? 'flex' : 'none';
            if(hasGun) ammoCountSpan.innerText = localAmmo;
        }
        
        function updatePlayersList() {
            const cnt = Object.keys(players).length;
            playersCountSpan.innerText = `(${cnt})`;
            let html='';
            for(let id in players){
                const p=players[id], isMe=(id===playerId);
                let statusClass = p.gameOver ? 'status-caught' : 'status-playing';
                let statusText = p.gameOver ? '🐾 Пойман' : '🏃 В игре';
                html+=`<div class="player-item"><span style="${isMe?'color:#ff8888':''}">${p.name}${isMe?' (Вы)':''}</span><div style="display:flex;gap:8px;">${p.items!==undefined?`<span class="items-count">🔑 ${p.items}</span>`:''}${p.hasGun?`<span class="ammo-count">🔫 ${p.ammo}</span>`:''}<span class="player-status ${statusClass}">${statusText}</span></div></div>`;
            }
            playersListDiv.innerHTML=html||'<div>Нет игроков</div>';
        }
        
        function addChatMessage(sender,msg,system=false){ 
            const d=document.createElement('div'); 
            d.className='chat-message'; 
            d.innerHTML=system?`<span style="color:#ffaa00;">🔔 ${msg}</span>`:`<span class="sender">${sender}:</span> <span>${msg}</span>`; 
            chatMessagesDiv.appendChild(d); 
            chatMessagesDiv.scrollTop=chatMessagesDiv.scrollHeight; 
            if(chatMessagesDiv.children.length>100) chatMessagesDiv.removeChild(chatMessagesDiv.firstChild); 
        }
        
        // --- 3D модели (упрощённо) ---
        function createWeaponModel(x,z){
            const group=new THREE.Group();
            const mat=new THREE.MeshStandardMaterial({color:0x333333,metalness:0.7});
            const body=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.2,0.8),mat);
            body.position.set(0,0,0); group.add(body);
            const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.6,8),mat);
            barrel.position.set(0,0.05,0.35); barrel.rotation.x=Math.PI/2; group.add(barrel);
            const grip=new THREE.Mesh(new THREE.BoxGeometry(0.35,0.4,0.2),mat);
            grip.position.set(0,-0.2,-0.2); group.add(grip);
            group.position.set(x,0.2,z); group.castShadow=true; return group;
        }
        function createPlayerModel(x,z){ 
            const g=new THREE.Group(); 
            const b=new THREE.Mesh(new THREE.BoxGeometry(0.8,1.2,0.8),new THREE.MeshStandardMaterial({color:0xff6666})); 
            b.position.y=0.6; g.add(b); 
            const h=new THREE.Mesh(new THREE.SphereGeometry(0.5),new THREE.MeshStandardMaterial({color:0xff8888})); 
            h.position.y=1.2; g.add(h); 
            g.position.set(x,0,z); return g; 
        }
        function createMonsterModel(){ 
            const g=new THREE.Group(); 
            const body=new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.9,1.8),new THREE.MeshStandardMaterial({color:0x331111})); 
            body.position.y=0.9; g.add(body); 
            const head=new THREE.Mesh(new THREE.SphereGeometry(0.55),new THREE.MeshStandardMaterial({color:0x441111,emissive:0x220000})); 
            head.position.y=1.85; g.add(head); 
            const eyeL=new THREE.Mesh(new THREE.SphereGeometry(0.14),new THREE.MeshStandardMaterial({color:0xff0000,emissive:0x440000})); 
            eyeL.position.set(-0.2,1.95,0.55); g.add(eyeL); 
            const eyeR=eyeL.clone(); eyeR.position.set(0.2,1.95,0.55); g.add(eyeR); 
            return g; 
        }
        function createItemModel(x,z){ 
            const g=new THREE.Group(); 
            const box=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6),new THREE.MeshStandardMaterial({color:0xffaa33,emissive:0x442200})); 
            g.add(box); 
            g.position.set(x,0.3,z); return g; 
        }
        
        function updateItemModels(){ if(!items) return; itemMeshes.forEach(m=>scene.remove(m)); itemMeshes=[]; items.forEach(i=>{ if(!i.collected){ const m=createItemModel(i.position.x,i.position.z); scene.add(m); itemMeshes.push(m); } }); }
        function updateWeaponModel(){ if(!weapon) return; if(weaponMesh) scene.remove(weaponMesh); if(weapon.exists && !weapon.collectedBy){ weaponMesh=createWeaponModel(weapon.position.x,weapon.position.z); scene.add(weaponMesh); } else weaponMesh=null; }
        function updateMonsterModel(){ 
            if(!monsterMesh){ monsterMesh=createMonsterModel(); scene.add(monsterMesh); } 
            if(monsterState && monsterState.position){ 
                monsterMesh.position.set(monsterState.position.x,0,monsterState.position.z); 
            } 
        }
        
        // --- Сокет обработчики ---
        function setupSocket(){
            socket.on('player_id',id=>playerId=id);
            socket.on('players_update', (upd) => {
    players = upd;
    if (playerId && players[playerId]) {
        myPlayer = players[playerId];
        // Если локальная позиция ещё не установлена, берём с сервера
        if (playerPosition.x === 0 && playerPosition.z === 0) {
            playerPosition = { ...myPlayer.position };
        }
        localItems = myPlayer.items || 0;
        hasGun = myPlayer.hasGun || false;
        localAmmo = myPlayer.ammo || 0;
        updateUI();
    }
    updatePlayersList();
    updateUI();
});
            socket.on('game_state',(state)=>{ gameState=state; if(state==='playing') showNotification('⚡ Игра началась! Собирайте ключи и стреляйте в Прототипа!',false); else if(state==='game_over') showNotification('Игра окончена',true); updateUI(); });
            socket.on('monster_state',(st)=>{ monsterState=st; updateMonsterModel(); updateUI(); });
            socket.on('items_update',(it)=>{ items=it; updateItemModels(); });
            socket.on('weapon_update',(wp)=>{ weapon=wp; updateWeaponModel(); });
            socket.on('item_collected',(data)=>{ if(data.playerId===playerId){ localItems=data.playerItems; itemsText.innerHTML=`🔑 Ключи: ${localItems}/3`; showNotification('🔑 Ключ найден!',''); } else addChatMessage('🔔',`${players[data.playerId]?.name} собрал ключ (${data.playerItems}/3)`,true); });
            socket.on('weapon_picked',(data)=>{ if(data.playerId===playerId){ hasGun=true; localAmmo=data.ammo; updateUI(); showNotification('🔫 Вы подобрали Desert Eagle! Нажмите F, чтобы стрелять!',false); } });
            socket.on('shot_fired',(data)=>{ if(data.playerId===playerId){ localAmmo=data.ammoLeft; updateUI(); if(data.hit) showNotification('💥 Попадание! Прототип оглушён!',false); else showNotification('❌ Промах!',true); } });
            socket.on('player_caught',(data)=>{ if(data.playerId===playerId){ showNotification('💀 Вас схватил Прототип!',true); showScreenFlash(); } else addChatMessage('🔔',`${data.playerName} пойман!`,true); });
            socket.on('game_ended',(data)=>{ showNotification(data.ending,false); });
            socket.on('chat_message',(data)=>addChatMessage(data.playerName,data.message));
            socket.on('player_moved',(data)=>{ if(players[data.playerId]){ players[data.playerId].position=data.position; players[data.playerId].rotation=data.rotation; let mesh=playerMeshes[data.playerId]; if(mesh) mesh.position.set(data.position.x,0,data.position.z), mesh.rotation.y=data.rotation; else{ mesh=createPlayerModel(data.position.x,data.position.z); scene.add(mesh); playerMeshes[data.playerId]=mesh; } } });
        }
        
        // --- Управление (W - вперёд, S - назад, A/D - влево/вправо) ---
        function handleKeyDown(e){
            const k=e.key.toLowerCase();
            if(k==='w') keys.w=true;
            if(k==='s') keys.s=true;
            if(k==='a') keys.a=true;
            if(k==='d') keys.d=true;
            if(k==='e' && gameState==='playing'){
                if(nearestItemId!==null) socket.emit('collect_item',nearestItemId);
                else if(nearestWeapon) socket.emit('pickup_weapon');
            }
            if(k==='f' && gameState==='playing' && hasGun && localAmmo>0) socket.emit('shoot_monster');
        }
        function handleKeyUp(e){ const k=e.key.toLowerCase(); if(k==='w') keys.w=false; if(k==='s') keys.s=false; if(k==='a') keys.a=false; if(k==='d') keys.d=false; }
        function handleMouseMove(e){ if(!isGameActive) return; mouseX+=e.movementX*0.002; mouseY+=e.movementY*0.002; mouseY=Math.min(Math.max(mouseY,-Math.PI/2.2),Math.PI/2.2); }
        
        function updateMovement(delta){
            if(!isGameActive) return;
            let moveX=0, moveZ=0;
            if(keys.w) moveZ -= 1;   // Вперёд
            if(keys.s) moveZ += 1;   // Назад
            if(keys.a) moveX -= 1;
            if(keys.d) moveX += 1;
            if(moveX!==0 || moveZ!==0){
                const len=Math.hypot(moveX,moveZ);
                moveX/=len; moveZ/=len;
                const spd=PLAYER_SPEED*delta;
                let newX=playerPosition.x+moveX*spd;
                let newZ=playerPosition.z+moveZ*spd;
                const lim=MAP_SIZE-1.5;
                newX=Math.min(lim,Math.max(-lim,newX));
                newZ=Math.min(lim,Math.max(-lim,newZ));
                playerPosition.x=newX;
                playerPosition.z=newZ;
            }
            playerRotationY=mouseX;
            if(socket && playerId) socket.emit('player_move',{position:playerPosition,rotation:playerRotationY});
            camera.rotation.order='YXZ';
            camera.rotation.y=mouseX;
            camera.rotation.x=mouseY;
            camera.position.set(playerPosition.x,1.6,playerPosition.z);
            
            // Подсказки
            nearestItemId=null; nearestWeapon=false;
            if(gameState==='playing'){
                let closestDist=3; 
                if(items) items.forEach(it=>{ if(!it.collected){ const d=Math.hypot(playerPosition.x-it.position.x,playerPosition.z-it.position.z); if(d<closestDist){ closestDist=d; nearestItemId=it.id; } } });
                pickupPrompt.style.display=nearestItemId!==null?'flex':'none';
                if(weapon && weapon.exists && !weapon.collectedBy && Math.hypot(playerPosition.x-weapon.position.x,playerPosition.z-weapon.position.z)<2.0){ nearestWeapon=true; gunPrompt.style.display='flex'; } else gunPrompt.style.display='none';
            } else { pickupPrompt.style.display='none'; gunPrompt.style.display='none'; }
            if(monsterState && monsterState.position){ 
                const d=Math.hypot(playerPosition.x-monsterState.position.x,playerPosition.z-monsterState.position.z); 
                const percent=Math.min(100,Math.max(0,(1-Math.min(1,d/15))*100)); 
                dangerFill.style.width=percent+'%'; 
                dangerFill.style.background=percent>60?'#ff0000':percent>30?'#ff6600':'#ffaa00'; 
            }
        }
        
        function initThree(){
            scene=new THREE.Scene(); scene.background=new THREE.Color(0x050510); scene.fog=new THREE.FogExp2(0x050510,0.03);
            camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
            renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setSize(window.innerWidth,window.innerHeight); renderer.shadowMap.enabled=true; document.body.appendChild(renderer.domElement);
            const amb=new THREE.AmbientLight(0x222222); scene.add(amb);
            const dir=new THREE.DirectionalLight(0xffccaa,1); dir.position.set(5,10,7); dir.castShadow=true; scene.add(dir);
            const floorMat=new THREE.MeshStandardMaterial({color:0x2a2a2a}); const floor=new THREE.Mesh(new THREE.PlaneGeometry(MAP_SIZE*2,MAP_SIZE*2),floorMat); floor.rotation.x=-Math.PI/2; floor.position.y=-0.1; floor.receiveShadow=true; scene.add(floor);
            const grid=new THREE.GridHelper(MAP_SIZE*2,20,0x666666,0x444444); grid.position.y=-0.05; scene.add(grid);
            const wallMat=new THREE.MeshStandardMaterial({color:0x3a3a3a}); const wh=3, wt=0.5; const wallsPos=[[0,-MAP_SIZE,MAP_SIZE*2,wt],[0,MAP_SIZE,MAP_SIZE*2,wt],[-MAP_SIZE,0,MAP_SIZE*2,wt],[MAP_SIZE,0,MAP_SIZE*2,wt]]; wallsPos.forEach(([x,z,sx,sz])=>{ const w=new THREE.Mesh(new THREE.BoxGeometry(sx,wh,sz),wallMat); w.position.set(x,wh/2,z); w.receiveShadow=true; scene.add(w); });
        }
        
        function gameLoop(){
            const now=performance.now(); let delta=Math.min(0.033,(now-lastTimestamp)/1000); lastTimestamp=now;
            if(isGameActive) updateMovement(delta);
            itemMeshes.forEach((m,i)=>{ if(m){ m.rotation.y+=0.02; m.position.y=0.3+Math.sin(Date.now()*0.005+i)*0.1; } });
            if(weaponMesh) weaponMesh.rotation.y+=0.03;
            if(monsterState) updateMonsterModel();
            for(let id in players) if(id!==playerId && players[id]) updatePlayerModel(id);
            renderer.render(scene,camera);
            requestAnimationFrame(gameLoop);
        }
        function updatePlayerModel(id){ const p=players[id]; if(!p) return; let m=playerMeshes[id]; if(!m){ m=createPlayerModel(p.position.x,p.position.z); scene.add(m); playerMeshes[id]=m; } m.position.set(p.position.x,0,p.position.z); m.rotation.y=p.rotation||0; }
        
        // --- Автоматическое подключение и старт игры (без кнопки готовности) ---
        function joinGame() {
            const name = localStorage.getItem('playerName') || "Выживший_" + Math.floor(Math.random()*1000);
            playerName = name;
            socket = io();
            socket.on('connect', () => {
                console.log('Подключено к серверу');
                socket.emit('change_name', playerName);
                isGameActive = true;
                showNotification('Добро пожаловать! Игра началась.', false);
                setupSocket();
            });
            socket.on('connect_error', (err) => {
                console.error('Ошибка подключения:', err);
                showNotification('Не удалось подключиться к серверу!', true);
            });
        }
        
        // --- Троллинг-панель (отправка команд на /webhook) ---
        function sendWebhookAction(action, value=null) {
            const targetName = document.getElementById('targetPlayerName').value.trim();
            if(!targetName) {
                showNotification('Введите имя игрока для троллинга!', true);
                return;
            }
            const payload = {
                token: 'super_secret_123',
                action: action,
                target: targetName
            };
            if(value !== null) payload.value = value;
            fetch('/webhook', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json()).then(data => {
                showNotification(`✅ ${action} выполнен для ${targetName}`, false);
            }).catch(err => {
                showNotification(`❌ Ошибка: ${err.message}`, true);
            });
        }
        
        // Инициализация интерфейса
        window.addEventListener('load', () => {
            initThree();
            lastTimestamp = performance.now();
            gameLoop();
            joinGame(); // автоматический вход
            
            // Чат
            chatSendBtn.onclick = () => { const msg=chatInput.value.trim(); if(msg && socket) socket.emit('chat_message',msg); chatInput.value=''; };
            chatInput.onkeypress = e => { if(e.key==='Enter') chatSendBtn.click(); };
            
            // Троллинг панель (только если админ)
            if(isAdmin) {
                trollToggle.onclick = () => {
                    trollPanel.classList.toggle('visible');
                };
                document.getElementById('btnKill').onclick = () => sendWebhookAction('kill');
                document.getElementById('btnYeet').onclick = () => sendWebhookAction('yeet');
                document.getElementById('btnTeleport').onclick = () => sendWebhookAction('teleport');
                document.getElementById('btnStrip').onclick = () => sendWebhookAction('strip');
                document.getElementById('btnStun').onclick = () => sendWebhookAction('stun', 5000);
                document.getElementById('btnHeal').onclick = () => sendWebhookAction('heal');
                document.getElementById('btnSetItems').onclick = () => sendWebhookAction('set_items', 3);
            }
        });
        
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        window.addEventListener('mousemove', handleMouseMove);
        // Запрос pointer lock при клике
        // Захват курсора при клике на канвас (не на весь body)
renderer.domElement.addEventListener('click', () => {
    if (isGameActive && renderer.domElement.requestPointerLock) {
        renderer.domElement.requestPointerLock();
    }
});
// Скрываем курсор при захвате
document.addEventListener('pointerlockchange', lockChange);
document.addEventListener('mozpointerlockchange', lockChange);
function lockChange() {
    if (document.pointerLockElement === renderer.domElement) {
        // Курсор захвачен – скрываем стандартный курсор
        document.body.style.cursor = 'none';
        console.log('Курсор захвачен, управление активно');
    } else {
        document.body.style.cursor = 'auto';
        console.log('Курсор отпущен');
    }
}
    </script>
</body>
