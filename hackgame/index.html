<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Clicker | Киберпанк Idle-игра</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #020208);
            font-family: 'Orbitron', 'Courier New', monospace;
            color: #0ff;
            min-height: 100vh;
            padding: 20px;
        }
        /* Стили для авторизации */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .auth-card {
            background: rgba(0, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #0ff;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
        }
        .auth-card h1 {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .discord-login-btn {
            background: #5865F2;
            color: white;
            border: none;
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            padding: 12px 32px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
        }
        .discord-login-btn:hover {
            background: #4752c4;
            transform: scale(1.02);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 60px;
            margin-bottom: 16px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #0ff;
        }
        .logout-btn {
            background: none;
            border: 1px solid #f55;
            color: #f55;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
        }
        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .game-area {
            flex: 2;
            min-width: 280px;
            background: rgba(0, 20, 30, 0.6);
            backdrop-filter: blur(8px);
            border: 2px solid #0ff;
            border-radius: 28px;
            padding: 24px;
        }
        .right-panel {
            flex: 1.5;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .upgrades-panel, .chat-panel {
            background: rgba(0, 20, 30, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid #0ff;
            border-radius: 24px;
            padding: 16px;
        }
        .upgrades-panel h3, .chat-panel h3 {
            border-left: 4px solid #0ff;
            padding-left: 12px;
            margin-bottom: 16px;
            font-size: 1.3rem;
            text-shadow: 0 0 5px #0ff;
        }
        .upgrade-item {
            background: #021118;
            margin: 12px 0;
            padding: 12px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid #2a6f7f;
        }
        .upgrade-name { font-weight: bold; font-size: 1.1rem; letter-spacing: 1px; }
        .upgrade-desc { font-size: 0.7rem; color: #8df; }
        .upgrade-stats { font-size: 0.75rem; color: #afa; }
        button.buy-btn {
            background: linear-gradient(135deg, #0a3a4a, #02121a);
            border: 1px solid #0ff;
            color: #0ff;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
        }
        button.buy-btn:active { transform: scale(0.96); background: #0ff; color: #000; }
        .core-click { text-align: center; margin: 20px 0; }
        .core {
            width: 200px; height: 200px;
            background: radial-gradient(circle, #0ff, #006);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px cyan, inset 0 0 20px rgba(255,255,255,0.5);
            border: 2px solid #aff;
        }
        .core:active { transform: scale(0.96); }
        .resources { text-align: center; margin-bottom: 20px; background: #010a0f; padding: 12px; border-radius: 32px; }
        .data-count { font-size: 2.2rem; font-weight: bold; text-shadow: 0 0 8px cyan; }
        .dps { font-size: 1rem; }
        .floating-number {
            position: fixed;
            pointer-events: none;
            font-weight: bold;
            font-size: 1.8rem;
            color: #0ff;
            text-shadow: 0 0 6px #0ff;
            animation: floatUp 1s ease-out forwards;
            z-index: 1000;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0px) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }
        .mobile-tabs { display: none; }
        .chat-log { max-height: 260px; overflow-y: auto; font-size: 0.8rem; padding-right: 6px; }
        .chat-log div { border-bottom: 1px solid #0ff33f30; padding: 8px 4px; font-family: monospace; }
        .bonus-effect { background: #0ff22a20; border-left: 3px solid #0ff; }
        @media (max-width: 768px) {
            .game-container { flex-direction: column; }
            .right-panel { display: none; }
            .mobile-tabs {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: #02121cd9;
                backdrop-filter: blur(20px);
                border-top: 1px solid #0ff;
                justify-content: space-around;
                padding: 10px 0;
                z-index: 99;
            }
            .mobile-tabs button { background: none; border: none; color: #0ff; font-family: 'Orbitron', monospace; font-size: 1rem; padding: 8px 20px; }
            .mobile-panel { display: none; margin-bottom: 70px; }
            .mobile-panel.active { display: block; }
            body { padding-bottom: 70px; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #02121a; }
        ::-webkit-scrollbar-thumb { background: #0ff; border-radius: 4px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div id="authScreen" class="auth-container">
    <div class="auth-card">
        <h1>💾 NEXUS CLICKER</h1>
        <p>Войдите через Discord, чтобы начать взлом</p>
        <button id="discordLoginBtn" class="discord-login-btn">🚀 Войти через Discord</button>
    </div>
</div>

<div id="gameScreen" class="hidden">
    <div style="display: flex; justify-content: flex-end; align-items: center; gap: 16px; margin-bottom: 16px;">
        <div id="userInfo" class="user-info">
            <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
            <span id="userName"></span>
            <button id="logoutBtn" class="logout-btn">Выйти</button>
        </div>
    </div>
    <div class="game-container" id="app">
        <div class="game-area">
            <div class="resources">
                <div class="data-count" id="dataDisplay">0</div>
                <div class="dps" id="dpsDisplay">⚡ Пакетов/сек: 0</div>
            </div>
            <div class="core-click">
                <div class="core" id="clickCore">💾<br>НЕКСУС</div>
            </div>
            <div style="margin-top: 20px; font-size: 12px; text-align: center;" id="bonusStatus"></div>
        </div>
        <div class="right-panel">
            <div class="upgrades-panel" id="upgradesListDesktop"></div>
            <div class="chat-panel">
                <h3>🔌 ЛЕНТА DISCORD</h3>
                <div class="chat-log" id="chatLogDesktop"></div>
            </div>
        </div>
    </div>
    <div class="mobile-tabs">
        <button id="tabGameBtn">💾 ИГРА</button>
        <button id="tabShopBtn">📡 МАГАЗИН</button>
        <button id="tabStatsBtn">📜 ЛОГИ</button>
    </div>
    <div id="mobileGamePanel" class="mobile-panel active"></div>
    <div id="mobileShopPanel" class="mobile-panel"></div>
    <div id="mobileLogsPanel" class="mobile-panel"></div>
</div>

<script>
    // ---------- НАСТРОЙКИ OAuth2 ----------
    const DISCORD_CLIENT_ID = "838768887705"; // Ваш Client ID (из Discord Developer Portal)
    const REDIRECT_URI = encodeURIComponent(window.location.href.split('#')[0]); // текущий URL без хеша
    const DISCORD_AUTH_URL = `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify`;

    let currentUser = null;  // { id, username, avatar }

    // ---------- ИГРОВОЕ СОСТОЯНИЕ ----------
    let gameState = {
        data: 100,
        upgrades: {
            nodeServer: { level: 0, basePrice: 25, income: 1 },
            dataMiner: { level: 0, basePrice: 80, income: 5 },
            quantumCore: { level: 0, basePrice: 300, income: 20 }
        },
        overclockMulti: 1,
        overclockEndTime: 0,
        firewallActive: false,
        firewallEndTime: 0,
        lastTick: Date.now()
    };

    const upgradeDefs = {
        nodeServer: { name: "🔌 Нод-сервер", desc: "Автосбор пакетов", basePrice: 25, income: 1 },
        dataMiner: { name: "⚙️ Майнер данных", desc: "Параллельная обработка", basePrice: 80, income: 5 },
        quantumCore: { name: "💠 Квантовое ядро", desc: "Нейро-ускорение", basePrice: 300, income: 20 }
    };

    function getPrice(upgradeId) {
        let level = gameState.upgrades[upgradeId].level;
        let base = gameState.upgrades[upgradeId].basePrice;
        return Math.floor(base * Math.pow(1.15, level));
    }

    function buyUpgrade(upgradeId) {
        let price = getPrice(upgradeId);
        if (gameState.data >= price) {
            gameState.data -= price;
            gameState.upgrades[upgradeId].level++;
            saveGame();
            renderUI();
            addChatLog(`🟢 АПГРЕЙД: ${upgradeDefs[upgradeId].name} ур.${gameState.upgrades[upgradeId].level} куплен!`, "upgrade");
        } else {
            addChatLog(`❌ Не хватает пакетов для ${upgradeDefs[upgradeId].name}`, "error");
        }
    }

    function calculateDPS() {
        let total = 0;
        for (let id in gameState.upgrades) {
            let lvl = gameState.upgrades[id].level;
            let inc = gameState.upgrades[id].income;
            total += lvl * inc;
        }
        if (gameState.overclockMulti > 1 && Date.now() < gameState.overclockEndTime) total *= gameState.overclockMulti;
        if (gameState.firewallActive && Date.now() < gameState.firewallEndTime) total *= 0.5;
        return Math.floor(total);
    }

    let lastTimestamp = Date.now();
    function gameLoop() {
        let now = Date.now();
        let elapsed = Math.min(1, (now - lastTimestamp) / 1000);
        if (elapsed > 0) {
            let dps = calculateDPS();
            let gain = Math.floor(dps * elapsed);
            if (gain > 0) gameState.data += gain;
        }
        if (gameState.overclockMulti > 1 && now >= gameState.overclockEndTime) {
            gameState.overclockMulti = 1;
            addChatLog(`⚠️ Оверклок закончился. Доход вернулся к норме.`, "event");
            renderUI();
        }
        if (gameState.firewallActive && now >= gameState.firewallEndTime) {
            gameState.firewallActive = false;
            addChatLog(`🛡️ Дебафф файервола снят. Производство восстановлено.`, "event");
            renderUI();
        }
        lastTimestamp = now;
        updateDisplay();
        saveGame();
        requestAnimationFrame(gameLoop);
    }

    function updateDisplay() {
        document.getElementById("dataDisplay").innerText = Math.floor(gameState.data);
        let dps = calculateDPS();
        document.getElementById("dpsDisplay").innerHTML = `⚡ Пакетов/сек: ${dps}`;
        let bonusHtml = "";
        if (gameState.overclockMulti > 1 && Date.now() < gameState.overclockEndTime) {
            let remaining = Math.ceil((gameState.overclockEndTime - Date.now()) / 1000);
            bonusHtml += `<span style="color:#ffaa44;">⚡ ОВЕРКЛОК АКТИВЕН x2 (${remaining}с)</span><br>`;
        }
        if (gameState.firewallActive && Date.now() < gameState.firewallEndTime) {
            let remaining = Math.ceil((gameState.firewallEndTime - Date.now()) / 1000);
            bonusHtml += `<span style="color:#ff6644;">🛡️ ФАЙЕРВОЛ: -50% дохода (${remaining}с)</span><br>`;
        }
        document.getElementById("bonusStatus").innerHTML = bonusHtml;
        renderUpgradesList();
    }

    function renderUpgradesList() {
        let htmlDesktop = '', htmlMobile = '';
        for (let [id, def] of Object.entries(upgradeDefs)) {
            let level = gameState.upgrades[id].level;
            let price = getPrice(id);
            let income = gameState.upgrades[id].income;
            htmlDesktop += `
                <div class="upgrade-item">
                    <div class="upgrade-info">
                        <div class="upgrade-name">${def.name} Lv.${level}</div>
                        <div class="upgrade-desc">${def.desc}</div>
                        <div class="upgrade-stats">+${income} пакетов/сек каждый</div>
                    </div>
                    <button class="buy-btn" onclick="buyUpgrade('${id}')">⬆️ ${price} пак.</button>
                </div>`;
            htmlMobile += `
                <div class="upgrade-item">
                    <div class="upgrade-info">
                        <div class="upgrade-name">${def.name} Lv.${level}</div>
                        <div class="upgrade-desc">${def.desc}</div>
                        <div class="upgrade-stats">+${income} пакетов/сек</div>
                    </div>
                    <button class="buy-btn" onclick="buyUpgrade('${id}')">⬆️ ${price} пак.</button>
                </div>`;
        }
        if(document.getElementById("upgradesListDesktop")) document.getElementById("upgradesListDesktop").innerHTML = htmlDesktop;
        if(document.getElementById("mobileShopPanel")) document.getElementById("mobileShopPanel").innerHTML = `<div class="upgrades-panel">${htmlMobile}</div>`;
    }

    function addChatLog(msg, type = "info") {
        let logDivDesktop = document.getElementById("chatLogDesktop");
        let logDivMobile = document.getElementById("mobileLogsPanel");
        let entry = `<div class="${type === 'event' ? 'bonus-effect' : ''}">🟢 ${new Date().toLocaleTimeString()} | ${msg}</div>`;
        if (logDivDesktop) logDivDesktop.innerHTML = entry + logDivDesktop.innerHTML;
        if (logDivMobile) logDivMobile.innerHTML = entry + logDivMobile.innerHTML;
        if(logDivDesktop && logDivDesktop.children.length > 30) logDivDesktop.removeChild(logDivDesktop.lastChild);
    }

    function onCoreClick(event) {
        let clickValue = 1;
        if (gameState.overclockMulti > 1 && Date.now() < gameState.overclockEndTime) clickValue *= gameState.overclockMulti;
        if (gameState.firewallActive && Date.now() < gameState.firewallEndTime) clickValue = Math.floor(clickValue * 0.5);
        gameState.data += clickValue;
        updateDisplay();
        let x = event.clientX, y = event.clientY;
        let floatDiv = document.createElement("div");
        floatDiv.className = "floating-number";
        floatDiv.innerText = `+${clickValue}`;
        floatDiv.style.left = x - 20 + "px";
        floatDiv.style.top = y - 30 + "px";
        document.body.appendChild(floatDiv);
        setTimeout(() => floatDiv.remove(), 1000);
        saveGame();
    }

    function saveGame() {
        if (!currentUser) return;
        let save = {
            data: gameState.data,
            upgrades: gameState.upgrades,
            overclockMulti: gameState.overclockMulti,
            overclockEndTime: gameState.overclockEndTime,
            firewallActive: gameState.firewallActive,
            firewallEndTime: gameState.firewallEndTime,
            discordId: currentUser.id
        };
        localStorage.setItem(`nexusClickerSave_${currentUser.id}`, JSON.stringify(save));
    }

    function loadGame() {
        if (!currentUser) return;
        let saved = localStorage.getItem(`nexusClickerSave_${currentUser.id}`);
        if (saved) {
            try {
                let data = JSON.parse(saved);
                gameState.data = data.data;
                gameState.upgrades = data.upgrades;
                gameState.overclockMulti = data.overclockMulti || 1;
                gameState.overclockEndTime = data.overclockEndTime || 0;
                gameState.firewallActive = data.firewallActive || false;
                gameState.firewallEndTime = data.firewallEndTime || 0;
            } catch(e) {}
        } else {
            // Старый формат? пробуем без ID
            let old = localStorage.getItem("nexusClickerSave");
            if (old) {
                try {
                    let data = JSON.parse(old);
                    gameState.data = data.data;
                    gameState.upgrades = data.upgrades;
                    gameState.overclockMulti = data.overclockMulti || 1;
                    gameState.overclockEndTime = data.overclockEndTime || 0;
                    gameState.firewallActive = data.firewallActive || false;
                    gameState.firewallEndTime = data.firewallEndTime || 0;
                    localStorage.removeItem("nexusClickerSave");
                    saveGame();
                } catch(e) {}
            }
        }
        renderUI();
    }

    function renderUI() {
        updateDisplay();
        addChatLog("🔐 Система онлайн. Нексус готов.", "event");
    }

    // ---------- АВТОРИЗАЦИЯ DISCORD ----------
    function handleOAuthRedirect() {
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        if (accessToken) {
            // Получаем данные пользователя
            fetch('https://discord.com/api/users/@me', {
                headers: { Authorization: `Bearer ${accessToken}` }
            })
            .then(res => res.json())
            .then(user => {
                if (user.id) {
                    currentUser = {
                        id: user.id,
                        username: user.username,
                        avatar: user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` : ''
                    };
                    localStorage.setItem('nexusUser', JSON.stringify(currentUser));
                    // Убираем токен из URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                    showGame();
                    initGameAfterAuth();
                } else {
                    console.error('Ошибка получения пользователя', user);
                    document.getElementById('authScreen').classList.remove('hidden');
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('authScreen').classList.remove('hidden');
            });
        } else {
            // Проверяем, есть ли сохранённый пользователь
            const savedUser = localStorage.getItem('nexusUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showGame();
                initGameAfterAuth();
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('gameScreen').classList.add('hidden');
            }
        }
    }

    function showGame() {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        document.getElementById('userName').innerText = currentUser.username;
        if (currentUser.avatar) {
            document.getElementById('userAvatar').src = currentUser.avatar;
        } else {
            document.getElementById('userAvatar').src = 'https://cdn.discordapp.com/embed/avatars/0.png';
        }
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('nexusUser');
        document.getElementById('authScreen').classList.remove('hidden');
        document.getElementById('gameScreen').classList.add('hidden');
        // Очищаем игровой интерфейс, чтобы при новом входе всё загрузилось заново
        location.reload();
    }

    // ---------- FIREBASE С ФИЛЬТРАЦИЕЙ ПО ID ----------
    let dbRef = null;
    let firebaseInitialized = false;

    async function initFirebase() {
        if (firebaseInitialized) return;
        await loadFirebaseSDK();
        const firebaseConfig = {
            apiKey: "AIzaSyDj5TBK-RO_beayJwe4eWDug2dNdVVJPMo",
            authDomain: "nexusclicker-11c93.firebaseapp.com",
            databaseURL: "https://nexusclicker-11c93-default-rtdb.firebaseio.com",
            projectId: "nexusclicker-11c93",
            storageBucket: "nexusclicker-11c93.firebasestorage.app",
            messagingSenderId: "838768887705",
            appId: "1:838768887705:web:ebba70967ead51f6a97508",
            measurementId: "G-8MK03VH6S0"
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
        dbRef = database.ref("/discord_commands/");
        dbRef.on("value", (snapshot) => {
            const val = snapshot.val();
            if (val) {
                for (let key in val) {
                    let cmd = val[key];
                    handleDiscordCommand(cmd);
                    database.ref(`/discord_commands/${key}`).remove().catch(e => console.warn(e));
                }
            }
        }, (error) => {
            console.error("Ошибка Firebase:", error);
            addChatLog("⚠️ Потеря связи с Firebase. Discord-команды временно недоступны.", "error");
        });
        addChatLog("🌐 Firebase синхронизация активна. Ожидание команд из Discord.", "event");
        firebaseInitialized = true;
    }

    function loadFirebaseSDK() {
        return new Promise((resolve, reject) => {
            if (typeof firebase !== 'undefined') {
                resolve();
                return;
            }
            let attempts = 0;
            const interval = setInterval(() => {
                if (typeof firebase !== 'undefined') {
                    clearInterval(interval);
                    resolve();
                } else if (attempts > 30) {
                    clearInterval(interval);
                    reject(new Error('Firebase SDK не загрузился'));
                }
                attempts++;
            }, 500);
        });
    }

    function handleDiscordCommand(cmdObj) {
        if (!cmdObj || !cmdObj.type) return;
        // Глобальные команды (без user_id или user_id = "all")
        if (cmdObj.type === "overclock") {
            gameState.overclockMulti = 2;
            gameState.overclockEndTime = Date.now() + 60000;
            addChatLog("💥 ОВЕРКЛОК из Discord! Доход увеличен вдвое на 60 секунд!", "event");
            renderUI();
            saveGame();
            return;
        }
        if (cmdObj.type === "data_drop") {
            let chestReward = 250 + Math.floor(Math.random() * 500);
            gameState.data += chestReward;
            addChatLog(`📦 ВЫПАДЕНИЕ ДАННЫХ! Получено ${chestReward} бонусных пакетов из Discord.`, "event");
            renderUI();
            saveGame();
            return;
        }
        if (cmdObj.type === "firewall") {
            gameState.firewallActive = true;
            gameState.firewallEndTime = Date.now() + 45000;
            addChatLog(`🛡️ ФАЙЕРВОЛ АКТИВИРОВАН! Доход снижен на 50% на 45 секунд.`, "event");
            renderUI();
            saveGame();
            return;
        }
        // Личные команды (проверяем совпадение user_id)
        if (cmdObj.user_id && cmdObj.user_id !== currentUser?.id) {
            // Не наш игрок – игнорируем
            return;
        }
        if (cmdObj.type === "personal_bonus") {
            let amount = cmdObj.amount || 0;
            gameState.data += amount;
            addChatLog(`🎁 БОНУС ОТ БОТА! +${amount} Data!`, "event");
            renderUI();
            saveGame();
        }
        if (cmdObj.type === "reset_player") {
            // Сброс прогресса для текущего игрока
            gameState.data = 100;
            gameState.upgrades = {
                nodeServer: { level: 0, basePrice: 25, income: 1 },
                dataMiner: { level: 0, basePrice: 80, income: 5 },
                quantumCore: { level: 0, basePrice: 300, income: 20 }
            };
            addChatLog(`🔄 АДМИН СБРОСИЛ ВАШ ПРОГРЕСС!`, "event");
            renderUI();
            saveGame();
        }
    }

    function initGameAfterAuth() {
        loadGame();
        initMobile();
        document.getElementById("clickCore").addEventListener("click", onCoreClick);
        setInterval(() => updateDisplay(), 500);
        lastTimestamp = Date.now();
        gameLoop();
        initFirebase();
    }

    function initMobile() {
        let gamePanel = document.getElementById("mobileGamePanel");
        let shopPanel = document.getElementById("mobileShopPanel");
        let logsPanel = document.getElementById("mobileLogsPanel");
        if(gamePanel) {
            gamePanel.innerHTML = `<div class="game-area" style="margin:0;">${document.querySelector(".game-area").cloneNode(true).innerHTML}</div>`;
            let newCore = gamePanel.querySelector("#clickCore");
            if(newCore) newCore.addEventListener("click", onCoreClick);
        }
        document.getElementById("tabGameBtn")?.addEventListener("click", () => {
            document.querySelectorAll(".mobile-panel").forEach(p => p.classList.remove("active"));
            gamePanel.classList.add("active");
        });
        document.getElementById("tabShopBtn")?.addEventListener("click", () => {
            document.querySelectorAll(".mobile-panel").forEach(p => p.classList.remove("active"));
            shopPanel.classList.add("active");
            renderUpgradesList();
        });
        document.getElementById("tabStatsBtn")?.addEventListener("click", () => {
            document.querySelectorAll(".mobile-panel").forEach(p => p.classList.remove("active"));
            logsPanel.classList.add("active");
        });
        gamePanel.classList.add("active");
    }

    // ---------- ЗАПУСК ----------
    window.onload = () => {
        document.getElementById("discordLoginBtn").addEventListener("click", () => {
            window.location.href = DISCORD_AUTH_URL;
        });
        document.getElementById("logoutBtn")?.addEventListener("click", logout);
        handleOAuthRedirect();
    };
</script>
</body>
</html>
